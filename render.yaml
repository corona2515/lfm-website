# Render Blueprint for LeanFM Marketing Website
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: leanfm-website
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SITE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: leanfm-website-db
          property: connectionString
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: LEAD_WEBHOOK_URL
        sync: false
      - key: SAMPLE_INTAKE_WEBHOOK_URL
        sync: false
      - key: SAMPLE_UPLOAD_STORAGE_BUCKET
        sync: false
      - key: SAMPLE_UPLOAD_STORAGE_REGION
        sync: false
      - key: SAMPLE_UPLOAD_STORAGE_ENDPOINT
        sync: false
      - key: SAMPLE_UPLOAD_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: SAMPLE_UPLOAD_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: SAMPLE_UPLOAD_STORAGE_FORCE_PATH_STYLE
        sync: false
      - key: CLOSE_API_KEY
        sync: false
      - key: CLOSE_LEAD_STATUS_ID
        sync: false
      - key: CLOSE_SAMPLE_UPLOAD_STATUS_ID
        sync: false
      - key: CLOSE_SAMPLE_INTAKE_DRAFT_STATUS_ID
        sync: false
      - key: CLOSE_API_BASE_URL
        sync: false
      - key: ONPOINT_SAMPLE_INTAKE_URL
        sync: false
      - key: ONPOINT_SAMPLE_INTAKE_TIMEOUT_MS
        sync: false
      - key: ONPOINT_API_KEY
        sync: false
      - key: ONPOINT_API_KEY_HEADER
        sync: false
      - key: ONPOINT_STATUS_WEBHOOK_TOKEN
        sync: false
      - key: ONPOINT_STATUS_WEBHOOK_HEADER
        sync: false
      - key: SAMPLE_INTAKE_DRAFT_SECRET
        sync: false
      - key: SAMPLE_INTAKE_ABANDONMENT_HOURS
        sync: false
      - key: SAMPLE_INTAKE_DRAFT_RETENTION_DAYS
        sync: false
      - key: SAMPLE_INTAKE_CRON_TOKEN
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: APP_URL
        sync: false
      - key: GOOGLE_ANALYTICS_ID
        sync: false
    autoDeploy: true

  - type: cron
    name: leanfm-sample-intake-drafts
    runtime: node
    region: oregon
    schedule: "0 * * * *"
    buildCommand: npm ci --include=dev
    startCommand: node -e "fetch(process.env.SITE_URL + '/api/internal/sample-intake/process-abandoned', { method: 'POST', headers: { 'x-leanfm-sample-intake-cron': process.env.SAMPLE_INTAKE_CRON_TOKEN } }).then(async (res) => { if (!res.ok) { throw new Error(await res.text()) } }).catch((error) => { console.error(error); process.exit(1) })"
    envVars:
      - key: SITE_URL
        sync: false
      - key: SAMPLE_INTAKE_CRON_TOKEN
        sync: false

databases:
  - name: leanfm-website-db
    plan: starter
